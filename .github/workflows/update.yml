name: 每日更新 ETF 持股資料

on:
  schedule:
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests beautifulsoup4

      - name: 執行爬蟲
        run: python scraper.py

      - name: 上傳 data.json
        uses: actions/upload-artifact@v4
        with:
          name: data
          path: data.json

      - name: 寫入 data.json 到 repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "更新 ETF 持股資料"
          file_pattern: data.json
